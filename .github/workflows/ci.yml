name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate markdown files
        run: |
          echo "Checking required files exist..."
          for file in README.md LICENSE CODE_OF_CONDUCT.md CONTRIBUTING.md; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing required file: $file"
              exit 1
            fi
            echo "OK: $file"
          done

      - name: Validate issue templates
        run: |
          echo "Checking issue templates..."
          for file in .github/ISSUE_TEMPLATE/bug_report.md .github/ISSUE_TEMPLATE/feature_request.md; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing template: $file"
              exit 1
            fi
            echo "OK: $file"
          done

      - name: Validate PR template
        run: |
          if [ ! -f ".github/PULL_REQUEST_TEMPLATE.md" ]; then
            echo "ERROR: Missing PR template"
            exit 1
          fi
          echo "OK: .github/PULL_REQUEST_TEMPLATE.md"

      - name: Check for broken links in README
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
